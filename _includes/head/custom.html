
{% include base_path %}

<!-- start custom head snippets -->

<!-- Preload the profile image if it is your LCP element -->
<link rel="preload" href="/images/profile_light.webp" as="image">

<style>
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont,
               "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

/* Reserve avatar space to reduce layout shift */
.author__avatar {
  width: 200px;
  min-height: 300px;
}

.author__avatar img {
  width: 200px;
  height: auto;
  display: block;
}

/* General image stability */
img {
  max-width: 100%;
  height: auto;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
  document.querySelectorAll("img").forEach(function(img) {
    const isAvatar = img.closest(".author__avatar");
    if (!isAvatar) {
      img.setAttribute("loading", "lazy");
    }
  });
});
</script>

<meta name="theme-color" content="#000000">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="icon" href="/images/favicon.ico">

<!-- end custom head snippets -->
