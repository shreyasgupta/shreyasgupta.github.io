
{% include base_path %}

<!-- start custom head snippets -->

<!-- Preload only the LCP avatar image -->
<link rel="preload" href="{{ '/images/profile_light.webp' | relative_url }}" as="image          "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

/* Reserve avatar space to reduce layout shift */
.author__avatar {
  width: 200px;
  min-height: 300px;
}

.author__avatar img {
  width: 200px;
  height: auto;
  display: block;
}

/* General image stability */
img {
  max-width: 100%;
  height: auto;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
  document.querySelectorAll("img").forEach(function(img) {
    if (!img.closest(".author__avatar")) {
      img.setAttribute("loading", "lazy");
    }
  });
});
</script>

<meta name="theme-color" content="#000000">
<link rel="icon" href="{{ '/images/favicon.ico' | relative_url }}">

<!-- end custom head snippets -->
