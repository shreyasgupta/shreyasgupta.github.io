{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>


<style>
/* Prevent large layout shift caused by avatar */
.author__avatar img {
  width: 200px;
  height: auto;
}
</style>


<style>
/* Critical styles for fast first paint */
body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background-color: #fff;
}

.author__avatar img {
  width: 200px;
  height: auto;
  display: block;
}
</style>



<!-- Use System Fonts -->
<style>
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont,
               "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
</style>

<!-- Preload Profile Pic -->
<link rel="preload" href="/images/profile_light.webp" as="image">
<link rel="preload" href="/images/profile_dark.webp" as="image">

<!-- Lazy load all images -->
<script>
document.addEventListener("DOMContentLoaded", function() {
  document.querySelectorAll("img").forEach(function(img) {
    img.setAttribute("loading", "lazy");
  });
});
</script>

<!-- Preload and optimize fitst -->
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- Defer JavaScripts -->
<script>
document.addEventListener("DOMContentLoaded", function() {
  const scripts = document.querySelectorAll("script[src]");
  scripts.forEach(s => {
    if (!s.hasAttribute("defer")) {
      s.setAttribute("defer", "");
    }
  });
});
</script>

<!-- Defer all JS Cleanly -->

<script>
document.addEventListener("DOMContentLoaded", function () {
  const scripts = document.querySelectorAll("script[src]");
  scripts.forEach(s => {
    if (!s.defer) {
      s.defer = true;
    }
  });
});
</script>

<!-- Meta optimization -->

<meta name="theme-color" content="#000000">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Reduze font weight -->

<style>
body {
  font-weight: 400;
}
</style>


<!-- Favicon -->
<!--<link rel="icon" type="image/png" href="{{ '/images/profile-light.png' | relative_url }}">-->


<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<!-- end custom head snippets -->
